{{- if .Values.ap.podMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "llm-d-async.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-d-async.labels" . | nindent 4 }}
    {{- with .Values.ap.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "llm-d-async.selectorLabels" . | nindent 6 }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.ap.podMonitor.interval | quote }}
{{- end }}
