ap:
  igwBaseURL: "http://infra-inference-scheduling-inference-gateway-istio.llm-d-inference-scheduler.svc.cluster.local:80"
  image:
    repository: ghcr.io/llm-d-incubation/async-processor
    tag: 0.6.0
  imagePullPolicy: Always
  concurrency: 8
  prometheusURL: ""
  prometheusCacheTTL: ""
  metrics:
    enabled: true
    port: 9090
    secure: false
  # messageQueueImpl: "redis-sortedset" # can be "redis-sortedset", "redis-pubsub", or "gcp-pubsub"
  gcpPubSub:
    enabled: false
    requestSubscriberId: ""
    resultTopicId: ""
    requestPathURL: "/v1/completions"
  tls:
    secretName: ""
    insecureSkipVerify: false
    caCertKey: ""
    certKey: ""
    keyKey: ""
  redis:
    enabled: false
    # Option 1: provide the URL directly — chart creates the Secret automatically.
    # WARNING: Helm values are retrievable via `helm get values` and may expose credentials.
    # For production or credentialed URLs, prefer Option 2 (secretName/secretKey).
    # url: "redis://redis-master.redis.svc.cluster.local:6379"
    # Option 2: reference a pre-existing Secret (used when url is not set).
    secretName: "redis-creds"
    secretKey: "url"
    requestPathURL: "/v1/completions"
    # For redis-sortedset
    requestQueueName: "request-sortedset"
    resultQueueName: "result-list"
    pollIntervalMs: 1000
    batchSize: 10
    gateType: ""
    gateParams: {}
    # Full multi-queue configuration (overrides single-queue fields above).
    # For redis-sortedset, each entry supports its own gate_type and gate_params.
    # For redis-pubsub, only queue_name, inference_objective, request_path_url, igw_base_url are used.
    # queuesConfig:
    #   - queue_name: "queue-1"
    #     inference_objective: ""
    #     request_path_url: "/v1/completions"
    #     igw_base_url: "http://igw:80"
    #     gate_type: "prometheus-saturation"
    #     gate_params:
    #       pool: "pool-1"
    #       threshold: 0.7
    #   - queue_name: "queue-2"
    #     request_path_url: "/v1/completions"
    #     igw_base_url: "http://igw:80"
    #     gate_type: "redis-quota"
    #     gate_params:
    #       address: "redis:6379"
    #       limit: "5"
    queuesConfig: []
  # PodMonitor for model server metrics relabeling.
  # Creates a PodMonitor that scrapes vLLM metrics and relabels
  # the inference_pool pod label into scraped metrics.
  # Required when using prometheus-budget or prometheus-saturation gates
  # without llm-d's flow control plugin enabled.
  modelServerMonitor:
    enabled: false
    selector:
      llm-d.ai/role: decode
    port: modelserver
    path: /metrics
    interval: 15s
