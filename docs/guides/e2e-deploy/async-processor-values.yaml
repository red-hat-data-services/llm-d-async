ap:
  image:
    repository: ghcr.io/llm-d-incubation/llm-d-async
    tag: "938cd44"
  imagePullPolicy: Always
  igwBaseURL: "http://llm-d-inference-gateway-istio:80"
  messageQueueImpl: "redis-sortedset"
  concurrency: 4
  prometheusURL: "http://llmd-kube-prometheus-stack-prometheus.llm-d-monitoring.svc.cluster.local:9090"
  metrics:
    enabled: true
    port: 9090
    secure: false
  redis:
    enabled: true
    url: "redis://redis-master.redis.svc.cluster.local:6379"
    resultQueueName: "result-list"
    pollIntervalMs: 1000
    batchSize: 10
    queuesConfig:
      - queue_name: "request-sortedset"
        request_path_url: "/v1/completions"
        igw_base_url: "http://llm-d-inference-gateway-istio:80"
        gate_type: "prometheus-budget"
        gate_params:
          pool: "optimized-baseline"
          max_concurrency: "100"
          baseline: "0.05"
  podMonitor:
    enabled: true
    interval: "15s"
  prometheusRule:
    enabled: true
  grafana:
    dashboards:
      enabled: true
  modelServerMonitor:
    enabled: true
    selector:
      llm-d.ai/role: decode
    port: modelserver
    path: /metrics
    interval: 15s
